<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#04101B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>BeachFlow</title>
  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(120% 90% at 85% 8%, rgba(22,194,163,.10), transparent 55%),
        radial-gradient(110% 80% at 5% 95%, rgba(255,106,69,.08), transparent 55%),
        #04101B;
      font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      color: #EAF1F8;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    /* Container do app: largura de celular, centralizado no desktop, tela cheia no mobile */
    .bf-app {
      height: 100dvh;
      max-width: 440px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #04101B;
    }
    @media (min-width: 460px) {
      .bf-app {
        height: min(100dvh, 920px);
        margin-top: max(0px, calc((100dvh - 920px) / 2));
        border-radius: 26px;
        box-shadow: 0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.05);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
